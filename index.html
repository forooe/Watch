<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديو الخاص</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 1000px; box-shadow: 0 0 20px rgba(0,255,255,0.2); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <video id="player" playsinline controls>
            <source src="" type="video/mp4" />
        </video>
    </div>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player', {
            settings: ['speed'],
            speed: { selected: 1, options: [0.5, 1, 1.5, 2] }
        });
        const videoId = window.location.pathname.split('/').pop();
        document.querySelector('source').src = `/api/video/${videoId}`;
    </script>
</body>
</html>
