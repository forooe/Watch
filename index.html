<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديو الذكي</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #0f0f0f; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .video-container { width: 95%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="player" playsinline controls>
            <source src="" type="video/mp4" />
        </video>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // تشغيل المكتبة مع إعدادات كاملة (سرعة، جودة، تقديم وتأخير)
        const player = new Plyr('#player', {
            settings: ['speed', 'loop'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        // استخراج معرف الفيديو من الرابط وطلبه من السيرفر
        const videoId = window.location.pathname.split('/').pop();
        const source = document.querySelector('source');
        source.src = `/api/video/${videoId}`;
    </script>
</body>
</html>
